<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clockwatch</title>
    <style>
        body {
            overflow: hidden;
            background-color: black;
            color: white;
            font-family: "Arial Narrow", system-ui;
            margin: 0;
        }

        main {
            font-size: 25vw;
            font-weight: bold;
            line-height: 1;
            user-select: none;
            height: 100vmin;
            place-content: center;
        }

        main:fullscreen button{
            display: none;
        }

        body.no-sec main {
            font-size: 38vw;
        }

        body.no-sec #secondsPart {
            display: none;
        }

        #zone:not(:empty) {
            font-size: 1rem;
            font-weight: normal;
            text-align: center;
            margin-top: 2rem;
        }

        aside {
            font-size: large;
            position: fixed;
            inset: 0 auto 0 0;
            width: 20rem;
            max-width: 90vw;
            background-color: darkgray;
            padding: 1rem;
        }

        button {
            font-size: large;
        }

        aside>button:first-child,
        main>button:first-child {
            margin-bottom: 1rem;
        }

        main>button:first-child {
            position: absolute;
            inset: 1rem auto auto 1rem;
        }

        select {
            display: block;
            width: 100%;
            box-sizing: border-box;
            font-size: inherit;
        }
    </style>
</head>

<body>
    <main>
        <div id="clock" onclick="document.querySelector('aside').removeAttribute('hidden')">
        <span id="hours">00</span>:<span id="minutes">00</span><span id="secondsPart">:<span
                id="seconds">00</span></span>
                </div>
        <div id="zone"></div>
    </main>
    <aside hidden>
        <button title="Close" onclick="this.parentElement.setAttribute('hidden', true)">&times;</button>
        <fieldset style="margin-bottom: 1rem;">
            <legend>Clock</legend>
            <div style="margin-bottom: 1rem;">
                <input type="checkbox" id="secondsToggle" onchange="toggleSeconds()" checked>
                <label for="secondsToggle">Show seconds</label>
            </div>
            <div>
                <label for="timezone">Time zone</label>
                <select id="timezone" onchange="tzChange()">
                    <option value="" selected>Client</option>
                    <option value="America/Godthab">Greenland</option>
                    <option value="Europe/Copenhagen">Denmark</option>
                    <option value="America/New_York">New York</option>
                </select>
            </div>
        </fieldset>
        <fieldset>
            <legend>View</legend>
            <p><button onclick="toggleTransparency()">Toggle transparency</button></p>
            <p><button onclick="toggleFullscreen()">Toggle fullscreen</button></p>
        </fieldset>
    </aside>
    <script>
        const registerServiceWorker = async () => {
            if ("serviceWorker" in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register("/sw.js", {
                        scope: "/",
                    });
                    if (registration.installing) {
                        console.log("Service worker installing");
                    } else if (registration.waiting) {
                        console.log("Service worker installed");
                    } else if (registration.active) {
                        console.log("Service worker active");
                    }
                } catch (error) {
                    console.error(`Registration failed with ${error}`);
                }
            }
        };

        const h = document.getElementById("hours");
        const m = document.getElementById("minutes");
        const s = document.getElementById("seconds");
        let tz = window.Temporal ? Temporal.Now.timeZoneId() : null;

        function tzChange() {
            tz = document.getElementById("timezone").value;
            const zone = document.getElementById("zone");
            if (!tz) {
                tz = window.Temporal ? Temporal.Now.timeZoneId() : null;
                zone.textContent = "";
                return;
            }
            zone.textContent = tz;
        }

        setInterval(updateTime, 1000);

        function updateTime() {
            if (window.Temporal) {
                const time = Temporal.Now.plainTimeISO(tz);
                h.innerText = time.hour.toString().padStart(2, '0');
                m.innerText = time.minute.toString().padStart(2, '0');
                s.innerText = time.second.toString().padStart(2, '0');
            } else {
                const time = new Date();
                h.innerText = time.getHours().toString().padStart(2, '0');
                m.innerText = time.getMinutes().toString().padStart(2, '0');
                s.innerText = time.getSeconds().toString().padStart(2, '0');
            }
        }

        function toggleSeconds() {
            const b = document.body;
            if (b.classList.contains("no-sec")) {
                b.classList.remove("no-sec");
            } else {
                b.classList.add("no-sec");
            }
        }

        function toggleTransparency() {
            const body = document.querySelector("body");
            const bodyBg = body.style.backgroundColor;
            if (bodyBg === "transparent") {
                body.removeAttribute("style");
            } else {
                body.style.backgroundColor = "transparent";
            }
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                // If already in fullscreen, exit
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            } else {
                // Otherwise, request fullscreen for the specified element
                if (document.body.requestFullscreen) {
                    document.body.requestFullscreen();
                }
            }
        }
    </script>
</body>

</html>
